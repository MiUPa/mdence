<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MDence Stack Mark</title>
  <desc id="desc">Layered content cards with a strong M overlay.</desc>
  <defs>
    <linearGradient id="bg" x1="112" y1="72" x2="410" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#143654" />
